<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Simulation</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0078D7;
    color:white;
    font-family:"Segoe UI",sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:80%;
    max-width:900px;
}

.face{
    font-size:90px;
}

.title{
    font-size:38px;
    margin:20px 0;
}

.text{
    font-size:22px;
    line-height:1.5;
}

#percent{
    font-size:34px;
    margin:35px 0;
}

.small{
    font-size:18px;
    opacity:.9;
}

#prank{
    display:none;
    text-align:center;
}

button{
    margin-top:30px;
    padding:12px 28px;
    font-size:18px;
    cursor:pointer;
    border:none;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="container" id="screen">

<div class="face">:(</div>

<div class="title">
System Simulation
</div>

<div class="text">
This page demonstrates a simulated system issue screen for entertainment.
</div>

<div id="percent">0%</div>

<div class="small">
Simulation Code: DEMO_0x1001
</div>

</div>

<script>

let p = 0;

const percent = document.getElementById("percent");

const timer = setInterval(()=>{

    p++;

    percent.textContent = p + "%";

    if(p >= 100){

        clearInterval(timer);

        setTimeout(()=>{

            document.getElementById("screen").innerHTML = `
                <div id="prank" style="display:block;">
                    <h1 style="font-size:70px;">😂 THIS WAS A PRANK!</h1>

                    <p style="font-size:25px;margin-top:20px;">
                        Your device is completely fine.
                        This was only a harmless simulation.
                    </p>

                    <button onclick="location.reload()">
                        Close
                    </button>
                </div>
            `;

        },1000);

    }

},80);

</script>

</body>
</html>
